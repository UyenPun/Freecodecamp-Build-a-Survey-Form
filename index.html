<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build a Survey Form</title>

  <!-- style -->
  <link rel="stylesheet" href="./assets/css/main.min.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <!--1. You should have a page title in an h1 element with an id of title -->
      <h1 id="title" class="text-center">Survey Form</h1>

      <!--2. You should have a short explanation in a p element with an id of description -->
      <p id="description" class="description text-center">
        Thank you for taking the time to help us improve the platform !!
      </p>
    </header>

    <!--3. You should have a form element with an id of survey-form -->
    <form id="survey-form">
      <!--10. For the name, email, and number input fields, you can see corresponding label elements in the form, that describe the purpose of each field with the following ids: id="name-label", id="email-label", and id="number-label" -->
      <!--11. For the name, email, and number input fields, you can see placeholder text that gives a description or instructions for each field -->


      <!--4. Inside the form element, you are required to enter your name in an input field that has an id of name and a type of text -->
      <div class="form-group">
        <label id="name-label" for="name">Name</label>
        <input type="text" name="name" id="name" class="form-control" placeholder="Enter your name" required />
      </div>

      <!--
      5. Inside the form element, you are required to enter your email in an input field that has an id of email
      6. If you enter an email that is not formatted correctly, you will see an HTML5 validation error
    -->
      <div class="form-group">
        <label id="email-label" for="email">Email</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="Enter your Email" required />
      </div>

      <!--
      7. Inside the form, you can enter a number in an input field that has an id of number
      8. The number input should not accept non-numbers, either by preventing you from typing them or by showing an HTML5 validation error (depending on your browser).
      9. If you enter numbers outside the range of the number input, which are defined by the min and max attributes, you will see an HTML5 validation error
    -->
      <div class="form-group">
        <label id="number-label" for="number">Age <span class="clue">(optional)</span></label>
        <input type="number" name="age" id="number" min="10" max="99" class="form-control" placeholder="Age" />
      </div>

      <!--12. Inside the form element, you should have a select dropdown element with an id of dropdown and at least two options to choose from -->
      <div class="form-group">
        <p>Which option best describes your current role?</p>
        <select id="dropdown" name="role" class="form-control" required>
          <option disabled selected value>Select current role</option>
          <option value="student">Student</option>
          <option value="job">Full Time Job</option>
          <option value="learner">Full Time Learner</option>
          <option value="preferNo">Prefer not to say</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <p>Would you recommend web to a friend?</p>
        <label>
          <input name="user-recommend" value="definitely" type="radio" class="input-radio" checked />Definitely</label>
        <label>
          <input name="user-recommend" value="maybe" type="radio" class="input-radio" />Maybe</label>

        <label><input name="user-recommend" value="not-sure" type="radio" class="input-radio" />Not sure</label>
      </div>

      <div class="form-group">
        <p>
          What is your favorite feature of web?
        </p>
        <select id="most-like" name="mostLike" class="form-control" required>
          <option disabled selected value>Select an option</option>
          <option value="challenges">Challenges</option>
          <option value="projects">Projects</option>
          <option value="community">Community</option>
          <option value="openSource">Open Source</option>
        </select>
      </div>

      <div class="form-group">
        <p>
          What would you like to see improved?
          <span class="clue">(Check all that apply)</span>
        </p>

        <label>
          <input name="prefer" value="front-end-projects" type="checkbox" class="input-checkbox" />Front-end
          Projects
        </label>
        <label>
          <input name="prefer" value="back-end-projects" type="checkbox" class="input-checkbox" />Back-end
          Projects
        </label>
        <label>
          <input name="prefer" value="data-visualization" type="checkbox" class="input-checkbox" />Data
          Visualization
        </label>
        <label>
          <input name="prefer" value="challenges" type="checkbox" class="input-checkbox" />Challenges
        </label>
        <label>
          <input name="prefer" value="open-source-community" type="checkbox" class="input-checkbox" />Open Source
          Community
        </label>
        <label>
          <input name="prefer" value="gitter-help-rooms" type="checkbox" class="input-checkbox" />Gitter help
          rooms
        </label>
        <label>
          <input name="prefer" value="videos" type="checkbox" class="input-checkbox" />Videos
        </label>
        <label>
          <input name="prefer" value="city-meetups" type="checkbox" class="input-checkbox" />City Meetups
        </label>
        <label>
          <input name="prefer" value="wiki" type="checkbox" class="input-checkbox" />Wiki
        </label>
        <label>
          <input name="prefer" value="forum" type="checkbox" class="input-checkbox" />Forum
        </label>
        <label>
          <input name="prefer" value="additional-courses" type="checkbox" class="input-checkbox" />Additional
          Courses
        </label>
      </div>

      <div class="form-group">
        <p>Any comments or suggestions?</p>
        <textarea id="comments" class="input-textarea" name="comment" placeholder="Enter your comment here...">
        </textarea>
      </div>

      <div class="form-group">
        <button type="submit" id="submit" class="submit-button">Submit</button>
      </div>
    </form>
  </div>
</body>

</html>
